name: lesson-gates

# Makes the detection gates self-enforcing: if hooks/evidence-audit stops flagging
# a real violation (or starts flagging a tagged/probed rewrite), or dev-server-guard
# stops blocking a backgrounded watcher, CI goes red. A detection hook with no test
# is the SOFT trap it exists to prevent.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax + shellcheck
        run: |
          bash -n hooks/evidence-audit.sh
          bash -n hooks/dev-server-guard.sh
          python3 -m py_compile hooks/evidence-audit.py
          shellcheck -S error hooks/evidence-audit.sh hooks/dev-server-guard.sh

      - name: evidence-audit -- causal fail fixture MUST flag (Lesson 2)
        run: |
          if bash hooks/evidence-audit.sh hooks/test-fixtures/fail_untagged_diagnosis.jsonl; then
            echo "::error::causal fixture did NOT flag the '242 snapshot' diagnosis"; exit 1
          fi
          echo "causal flagged as expected"

      - name: evidence-audit -- causal pass fixture MUST be clean
        run: bash hooks/evidence-audit.sh hooks/test-fixtures/pass_tagged_diagnosis.jsonl

      - name: evidence-audit -- absence/state fail fixture MUST flag (Lessons 11/12/15)
        run: |
          if bash hooks/evidence-audit.sh hooks/test-fixtures/fail_absence_state.jsonl; then
            echo "::error::absence/state fixture did NOT flag"; exit 1
          fi
          echo "absence/state flagged as expected"

      - name: evidence-audit -- absence/state pass fixture MUST be clean (probe+tag)
        run: bash hooks/evidence-audit.sh hooks/test-fixtures/pass_absence_probed.jsonl

      - name: evidence-audit -- Stop mode blocks on a violation
        run: |
          OUT="$(printf '{"transcript_path":"%s/hooks/test-fixtures/fail_untagged_diagnosis.jsonl","stop_hook_active":false}' "$PWD" \
            | bash hooks/evidence-audit.sh --stop)"
          echo "$OUT" | grep -q '"decision": "block"' || { echo "::error::Stop mode did not block"; exit 1; }
          echo "Stop mode blocked as expected"

      - name: evidence-audit -- Stop loop-guard (stop_hook_active=true is silent)
        run: |
          OUT="$(printf '{"transcript_path":"%s/hooks/test-fixtures/fail_absence_state.jsonl","stop_hook_active":true}' "$PWD" \
            | bash hooks/evidence-audit.sh --stop)"
          [ -z "$OUT" ] || { echo "::error::loop guard failed"; exit 1; }
          echo "loop guard held (silent) as expected"

      - name: dev-server-guard -- backgrounded watcher MUST block (Lesson 14)
        run: |
          OUT="$(printf '{"tool_name":"Bash","tool_input":{"command":"npm run dev","run_in_background":true}}' | bash hooks/dev-server-guard.sh)"
          echo "$OUT" | grep -q '"continue":false' || { echo "::error::dev-server-guard did not block"; exit 1; }
          echo "backgrounded watcher blocked as expected"

      - name: dev-server-guard -- foreground start+kill MUST pass
        run: |
          OUT="$(printf '{"tool_name":"Bash","tool_input":{"command":"npm run dev & P=$!; sleep 3; curl -sf localhost:3000; kill $P"}}' | bash hooks/dev-server-guard.sh)"
          [ -z "$OUT" ] || { echo "::error::dev-server-guard blocked an allowed foreground start+kill"; exit 1; }
          echo "foreground start+kill allowed as expected"

      - name: dev-server-guard -- build (not a watcher) MUST pass
        run: |
          OUT="$(printf '{"tool_name":"Bash","tool_input":{"command":"vite build","run_in_background":true}}' | bash hooks/dev-server-guard.sh)"
          [ -z "$OUT" ] || { echo "::error::dev-server-guard blocked a non-watching build"; exit 1; }
          echo "build allowed as expected"

      - name: precompact-archive -- snapshots the transcript before compaction
        run: |
          bash -n hooks/precompact-archive.sh
          shellcheck -S error hooks/precompact-archive.sh
          TMP="$(mktemp "${RUNNER_TEMP:-/tmp}/t.XXXX.jsonl")"; echo '{"type":"user"}' > "$TMP"
          export HOME="${RUNNER_TEMP:-/tmp}/fakehome"; mkdir -p "$HOME"
          printf '{"transcript_path":"%s","trigger":"auto"}' "$TMP" | bash hooks/precompact-archive.sh
          N="$(ls "$HOME"/.claude/precompact-archives/*.jsonl 2>/dev/null | wc -l)"
          [ "$N" -ge 1 ] || { echo "::error::precompact-archive did not snapshot the transcript"; exit 1; }
          echo "precompact-archive snapshotted as expected"

      - name: precompact-archive -- missing transcript_path is a silent no-op
        run: printf '{"trigger":"auto"}' | bash hooks/precompact-archive.sh

      - name: Ledger invariant -- NO row is SOFT (every lesson is gated)
        run: |
          N="$(grep -cE '\| SOFT \|' LEDGER.md || true)"
          if [ "$N" -ne 0 ]; then
            echo "::error::$N SOFT (ungated) lesson row(s) remain in LEDGER.md"
            grep -nE '\| SOFT \|' LEDGER.md
            exit 1
          fi
          echo "0 SOFT rows -- every lesson is gated"
