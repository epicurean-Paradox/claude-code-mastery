name: lesson-gates

# Makes the Lesson-2 detection gate self-enforcing: if hooks/diagnosis-evidence-audit
# stops flagging the real failure (or starts flagging the tagged rewrite), CI goes red.
# A detection hook with no test is the SOFT trap it exists to prevent.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  diagnosis-evidence-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax (bash + python)
        run: |
          bash -n hooks/diagnosis-evidence-audit.sh
          python3 -m py_compile hooks/diagnosis-evidence-audit.py

      - name: Shellcheck (errors only)
        run: shellcheck -S error hooks/diagnosis-evidence-audit.sh

      - name: Self-test -- fail fixture MUST flag (exit 1)
        run: |
          if bash hooks/diagnosis-evidence-audit.sh hooks/test-fixtures/fail_untagged_diagnosis.jsonl; then
            echo "::error::fail fixture did NOT flag the '242 snapshot' diagnosis -- detection gate is broken"
            exit 1
          fi
          echo "fail fixture flagged as expected"

      - name: Self-test -- pass fixture MUST be clean (exit 0)
        run: bash hooks/diagnosis-evidence-audit.sh hooks/test-fixtures/pass_tagged_diagnosis.jsonl

      - name: Self-test -- Stop mode blocks on a violation
        run: |
          OUT="$(printf '{"transcript_path":"%s/hooks/test-fixtures/fail_untagged_diagnosis.jsonl","stop_hook_active":false}' "$PWD" \
            | bash hooks/diagnosis-evidence-audit.sh --stop)"
          echo "$OUT" | grep -q '"decision": "block"' || { echo "::error::Stop mode did not block on the violation"; exit 1; }
          echo "Stop mode blocked as expected"

      - name: Self-test -- Stop mode loop-guard (stop_hook_active=true is silent)
        run: |
          OUT="$(printf '{"transcript_path":"%s/hooks/test-fixtures/fail_untagged_diagnosis.jsonl","stop_hook_active":true}' "$PWD" \
            | bash hooks/diagnosis-evidence-audit.sh --stop)"
          [ -z "$OUT" ] || { echo "::error::loop guard failed -- emitted output while stop_hook_active"; exit 1; }
          echo "loop guard held (silent) as expected"

      - name: Syntax -- new hooks (bash + python)
        run: |
          bash -n hooks/claim-evidence-audit.sh
          bash -n hooks/dev-server-guard.sh
          python3 -m py_compile hooks/claim-evidence-audit.py
          shellcheck -S error hooks/claim-evidence-audit.sh hooks/dev-server-guard.sh

      - name: L11/12/15 claim-evidence -- fail fixture MUST flag (exit 1)
        run: |
          if bash hooks/claim-evidence-audit.sh hooks/test-fixtures/fail_absence_state.jsonl; then
            echo "::error::absence/state fixture did NOT flag -- detection broken"; exit 1
          fi
          echo "absence/state flagged as expected"

      - name: L11/12/15 claim-evidence -- pass fixture MUST be clean (probe+tag)
        run: bash hooks/claim-evidence-audit.sh hooks/test-fixtures/pass_absence_probed.jsonl

      - name: L14 dev-server-guard -- backgrounded watcher MUST block
        run: |
          OUT="$(printf '{"tool_name":"Bash","tool_input":{"command":"npm run dev","run_in_background":true}}' | bash hooks/dev-server-guard.sh)"
          echo "$OUT" | grep -q '"continue":false' || { echo "::error::dev-server-guard did not block a backgrounded watcher"; exit 1; }
          echo "backgrounded watcher blocked as expected"

      - name: L14 dev-server-guard -- foreground start+kill MUST pass
        run: |
          OUT="$(printf '{"tool_name":"Bash","tool_input":{"command":"npm run dev & P=$!; sleep 3; curl -sf localhost:3000; kill $P"}}' | bash hooks/dev-server-guard.sh)"
          [ -z "$OUT" ] || { echo "::error::dev-server-guard blocked an allowed foreground start+kill"; exit 1; }
          echo "foreground start+kill allowed as expected"

      - name: L14 dev-server-guard -- build (not a watcher) MUST pass
        run: |
          OUT="$(printf '{"tool_name":"Bash","tool_input":{"command":"vite build","run_in_background":true}}' | bash hooks/dev-server-guard.sh)"
          [ -z "$OUT" ] || { echo "::error::dev-server-guard blocked a non-watching build"; exit 1; }
          echo "build allowed as expected"

      - name: Ledger invariant -- NO row is SOFT (every lesson is gated)
        run: |
          N="$(grep -cE '\| SOFT \|' LEDGER.md || true)"
          if [ "$N" -ne 0 ]; then
            echo "::error::$N SOFT (ungated) lesson row(s) remain in LEDGER.md -- an ungated lesson is an open defect"
            grep -nE '\| SOFT \|' LEDGER.md
            exit 1
          fi
          echo "0 SOFT rows -- every lesson is gated"
